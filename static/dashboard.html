<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Intellecta AI - Premium Knowledge Hub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23ea580c' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Ccircle cx='12' cy='12' r='4'/%3E%3Cpath d='M12 2v6M12 16v6M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M2 12h6M16 12h6M4.93 19.07l4.24-4.24M14.83 9.17l4.24-4.24'/%3E%3C/svg%3E">
    <!-- Tailwind CSS & Outfit/Inter Fonts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <!-- React, ReactDOM and Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- D3.js CDN for visual relationship analytics -->
    <script src="https://d3js.org/d3.v7.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', '-apple-system', 'sans-serif'],
                        outfit: ['Outfit', 'sans-serif'],
                        mono: ['Fira Code', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                        },
                        slate: {
                            950: '#090d16',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body {
            background-color: #fbfaf7;
            background-image: 
                radial-gradient(at 0% 0%, rgba(249, 115, 22, 0.05) 0px, transparent 50%), 
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.03) 0px, transparent 50%);
            background-size: 100% 100%;
        }

        /* Custom thin scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(249, 115, 22, 0.15);
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(249, 115, 22, 0.3);
        }

        /* Floating animation for landing layout */
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
        .floating-graphic {
            animation: float 6s ease-in-out infinite;
        }

        /* Fade In Up Entry Keyframes */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in-up {
            animation: fadeInUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* Add staggered transition delays to create organic flow */
        .stagger-1 { animation-delay: 0.08s; }
        .stagger-2 { animation-delay: 0.16s; }
        .stagger-3 { animation-delay: 0.24s; }

        .log-card {
            border-left-width: 3px;
            border-color: #cbd5e1;
            transition: all 0.2s ease;
            animation: fadeInUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .log-card.perception { border-left-color: #a855f7; background: rgba(168, 85, 247, 0.01); }
        .log-card.decision { border-left-color: #ea580c; background: rgba(234, 88, 12, 0.01); }
        .log-card.action { border-left-color: #f97316; background: rgba(249, 115, 22, 0.01); }
        .log-card.memory { border-left-color: #ef4444; background: rgba(239, 68, 68, 0.01); }
        .log-card.done { border-left-color: #10b981; background: rgba(16, 185, 129, 0.02); color: #065f46; }
    </style>
</head>
<body class="min-height-screen flex flex-col overflow-x-hidden">

    <div id="root" class="flex flex-col min-h-screen"></div>

    <!-- Main Application Script -->
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function WorkspaceAnalytics({ data, activeTab, setActiveTab, onClose }) {
            const svgRef = useRef(null);
            const tooltipRef = useRef(null);

            useEffect(() => {
                if (activeTab !== 'graph' || !data.nodes || data.nodes.length === 0) return;

                // Initialize D3 canvas
                const width = 800;
                const height = 450;
                
                // Clear past SVG elements
                d3.select(svgRef.current).selectAll("*").remove();

                const svg = d3.select(svgRef.current)
                    .attr("viewBox", [0, 0, width, height])
                    .style("width", "100%")
                    .style("height", "auto");

                // Gradient filters for links
                const defs = svg.append("defs");
                const linkGrad = defs.append("linearGradient")
                    .attr("id", "link-glow")
                    .attr("x1", "0%").attr("y1", "0%")
                    .attr("x2", "100%").attr("y2", "100%");
                linkGrad.append("stop").attr("offset", "0%").attr("stop-color", "#f97316").attr("stop-opacity", 0.4);
                linkGrad.append("stop").attr("offset", "100%").attr("stop-color", "#ea580c").attr("stop-opacity", 0.6);

                // Setup force layout simulation
                const simulation = d3.forceSimulation(data.nodes)
                    .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
                    .force("charge", d3.forceManyBody().strength(-250))
                    .force("center", d3.forceCenter(width / 2, height / 2))
                    .force("collision", d3.forceCollide().radius(60));

                // Draw connection links
                const link = svg.append("g")
                    .attr("stroke", "url(#link-glow)")
                    .attr("stroke-opacity", 0.6)
                    .selectAll("line")
                    .data(data.links)
                    .join("line")
                    .attr("stroke-width", d => Math.max(1.5, d.value * 5.5));

                // Drag gesture handlers
                function dragstarted(event, d) {
                    if (!event.active) simulation.alphaTarget(0.3).restart();
                    d.fx = d.x;
                    d.fy = d.y;
                }
                function dragged(event, d) {
                    d.fx = event.x;
                    d.fy = event.y;
                }
                function dragended(event, d) {
                    if (!event.active) simulation.alphaTarget(0);
                    d.fx = null;
                    d.fy = null;
                }

                // Draw Node Groups
                const node = svg.append("g")
                    .selectAll("g")
                    .data(data.nodes)
                    .join("g")
                    .call(d3.drag()
                        .on("start", dragstarted)
                        .on("drag", dragged)
                        .on("end", dragended)
                    )
                    .style("cursor", "grab");

                // Glowing base circles
                node.append("circle")
                    .attr("r", 24)
                    .attr("fill", "#ffffff")
                    .attr("stroke", d => d.group % 2 === 0 ? "#ea580c" : "#a855f7")
                    .attr("stroke-width", 3.5)
                    .style("filter", "drop-shadow(0px 4px 12px rgba(234, 88, 12, 0.12))")
                    .on("mouseover", (event, d) => {
                        d3.select(event.currentTarget)
                            .transition().duration(200)
                            .attr("r", 28)
                            .attr("stroke-width", 5);

                        // Show tooltip
                        const keywordsList = d.keywords && d.keywords.length > 0 
                            ? d.keywords.join(", ") 
                            : "None";
                        
                        d3.select(tooltipRef.current)
                            .style("opacity", 1)
                            .html(`
                                <div class="font-sans p-3 rounded-xl border border-slate-200/60 bg-white/80 backdrop-blur-md shadow-xl text-xs text-slate-700 leading-relaxed max-w-[240px]">
                                    <p class="font-bold text-slate-950 mb-1 truncate">${d.name}</p>
                                    <p class="mb-1"><strong class="text-slate-600">Index Chunks:</strong> ${d.chunks}</p>
                                    <p><strong class="text-slate-600">Top Keywords:</strong> <span class="text-brand-600 font-medium">${keywordsList}</span></p>
                                </div>
                            `);
                    })
                    .on("mousemove", (event) => {
                        const bounds = svgRef.current.getBoundingClientRect();
                        d3.select(tooltipRef.current)
                            .style("left", `${event.clientX - bounds.left + 20}px`)
                            .style("top", `${event.clientY - bounds.top - 10}px`);
                    })
                    .on("mouseout", (event) => {
                        d3.select(event.currentTarget)
                            .transition().duration(200)
                            .attr("r", 24)
                            .attr("stroke-width", 3.5);

                        d3.select(tooltipRef.current).style("opacity", 0);
                    });

                // Inner core bullet dot
                node.append("circle")
                    .attr("r", 7)
                    .attr("fill", d => d.group % 2 === 0 ? "#f97316" : "#c084fc");

                // Document Title Labels below nodes
                node.append("text")
                    .attr("dy", 38)
                    .attr("text-anchor", "middle")
                    .attr("class", "font-sans text-[10px] font-bold fill-slate-800 tracking-wide bg-white/85 px-2 py-0.5 rounded")
                    .text(d => d.name.length > 16 ? d.name.substring(0, 14) + "..." : d.name);

                // Update force frame positions
                simulation.on("tick", () => {
                    link
                        .attr("x1", d => d.source.x)
                        .attr("y1", d => d.source.y)
                        .attr("x2", d => d.target.x)
                        .attr("y2", d => d.target.y);

                    node
                        .attr("transform", d => `translate(${d.x},${d.y})`);
                });

                return () => simulation.stop();
            }, [activeTab, data]);

            return (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-slate-950/60 backdrop-blur-sm animate-fade-in-up">
                    <div className="bg-[#fbfaf7] border border-slate-200 shadow-2xl rounded-3xl max-w-4xl w-full overflow-hidden flex flex-col max-h-[90vh]">
                        
                        {/* Premium Header */}
                        <div className="px-8 py-5 border-b border-slate-200/60 bg-white flex justify-between items-center">
                            <div>
                                <h3 className="font-outfit text-lg font-bold text-slate-950 flex items-center gap-2">
                                    <span>🔮</span> Semantic Workspace Analytics
                                </h3>
                                <p className="text-xs text-slate-400 mt-0.5">Explore semantic similarity connections and vector cosine ratios.</p>
                            </div>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-800 transition-colors p-1.5 hover:bg-slate-100 rounded-full">
                                <svg className="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5"><path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                            </button>
                        </div>

                        {/* Tab Selector */}
                        <div className="px-8 py-3 bg-slate-100/50 border-b border-slate-200 flex gap-3 items-center">
                            <button 
                                onClick={() => setActiveTab('graph')} 
                                className={`px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide transition-all duration-200 ${activeTab === 'graph' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                🌐 Connection Graph
                            </button>
                            <button 
                                onClick={() => setActiveTab('heatmap')} 
                                className={`px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide transition-all duration-200 ${activeTab === 'heatmap' ? 'bg-brand-600 text-white shadow-md' : 'text-slate-600 hover:bg-slate-200'}`}
                            >
                                🎛️ Similarity Heatmap
                            </button>
                        </div>

                        {/* Visualization Canvas Area */}
                        <div className="flex-1 p-6 overflow-y-auto flex items-center justify-center min-h-[450px] relative bg-white">
                            {(!data.nodes || data.nodes.length === 0) ? (
                                <div className="text-center py-16">
                                    <div className="text-4xl mb-3">📂</div>
                                    <p className="text-sm font-bold text-slate-800">Your workspace is empty</p>
                                    <p className="text-xs text-slate-400 mt-1">Upload documents to start plotting automatic vector relationships.</p>
                                </div>
                            ) : activeTab === 'graph' ? (
                                <div className="w-full relative">
                                    <svg ref={svgRef} className="w-full h-auto rounded-2xl bg-slate-50/50 border border-slate-100 shadow-inner"></svg>
                                    {/* Hover Floating Tooltip */}
                                    <div ref={tooltipRef} className="absolute pointer-events-none opacity-0 transition-opacity duration-200 z-50"></div>
                                </div>
                            ) : (
                                /* Cosine Similarity Heatmap Grid */
                                <div className="w-full max-w-2xl overflow-x-auto p-4">
                                    <div className="bg-slate-50 border border-slate-200 shadow-inner rounded-2xl p-5">
                                        <table className="w-full border-collapse text-xs font-mono">
                                            <thead>
                                                <tr>
                                                    <th className="p-2 border-b border-slate-200 bg-white text-left font-sans font-bold text-slate-800">Document Name</th>
                                                    {data.names.map((n, idx) => (
                                                        <th key={idx} className="p-2 border-b border-slate-200 bg-white text-center font-sans font-bold text-slate-800 rotate-45 max-w-[80px] truncate" title={n}>
                                                            {n.length > 10 ? n.substring(0, 8) + '..' : n}
                                                        </th>
                                                    ))}
                                                </tr>
                                            </thead>
                                            <tbody>
                                                {data.nodes.map((nodeRow, rIdx) => (
                                                    <tr key={rIdx}>
                                                        <td className="p-2 border border-slate-200 bg-white font-sans font-semibold text-slate-700 truncate max-w-[150px]" title={nodeRow.name}>
                                                            {nodeRow.name}
                                                        </td>
                                                        {data.matrix[rIdx].map((score, cIdx) => {
                                                            // Color intensity based on cosine similarity score
                                                            let bgStyle = {};
                                                            if (rIdx === cIdx) {
                                                                bgStyle = { background: '#ffedd5', color: '#ea580c', fontWeight: 'bold' };
                                                            } else {
                                                                const opacity = Math.max(0.05, score);
                                                                bgStyle = { 
                                                                    background: `rgba(249, 115, 22, ${opacity})`, 
                                                                    color: score > 0.6 ? '#ffffff' : '#475569',
                                                                    fontWeight: score > 0.6 ? 'bold' : 'normal'
                                                                };
                                                            }
                                                            return (
                                                                <td 
                                                                    key={cIdx} 
                                                                    style={bgStyle} 
                                                                    className="p-2.5 border border-slate-200 text-center transition-all duration-300 hover:scale-110 cursor-default"
                                                                    title={`${data.nodes[rIdx].name} vs ${data.nodes[cIdx].name}: ${score.toFixed(4)}`}
                                                                >
                                                                    {score.toFixed(2)}
                                                                </td>
                                                            );
                                                        })}
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function App() {
            const [viewMode, setViewMode] = useState('landing'); // 'landing' or 'workspace'
            const [query, setQuery] = useState('');
            const [filesCount, setFilesCount] = useState(0);
            const [indexingStatus, setIndexingStatus] = useState('Ready');
            const [isUploading, setIsUploading] = useState(false);
            const [uploadProgress, setUploadProgress] = useState('');
            const [logs, setLogs] = useState([]);
            const [synthesis, setSynthesis] = useState('');
            const [isSearching, setIsSearching] = useState(false);
            
            // Dynamic visual analytics state hooks
            const [showAnalytics, setShowAnalytics] = useState(false);
            const [analyticsTab, setAnalyticsTab] = useState('graph'); // 'graph' or 'heatmap'
            const [relationshipData, setRelationshipData] = useState({ nodes: [], links: [], matrix: [], names: [] });

            const activeEventSourceRef = useRef(null);
            const terminalEndRef = useRef(null);
            const fileInputRef = useRef(null);

            const loadRelationships = async () => {
                try {
                    const res = await fetch("/v1/workspace/relationships");
                    const data = await res.json();
                    setRelationshipData(data || { nodes: [], links: [], matrix: [], names: [] });
                } catch (e) {
                    console.error("Failed loading workspace relationships:", e);
                }
            };

            // Poll documentation status
            const loadDocuments = async () => {
                try {
                    const res = await fetch("/v1/documents");
                    const data = await res.json();
                    setFilesCount(data ? data.length : 0);
                    loadRelationships(); // Auto-sync graph and similarity matrix states
                } catch (e) {
                    console.error(e);
                }
            };

            useEffect(() => {
                loadDocuments();
                // Initial scan status poller - poll faster (every 1 second) to capture chunk embeds smoothly
                const interval = setInterval(async () => {
                    try {
                        const res = await fetch("/v1/status");
                        const data = await res.json();
                        if (data.status === "indexing") {
                            setIndexingStatus("Syncing");
                            loadDocuments();
                        } else {
                            setIndexingStatus("Ready");
                            loadDocuments();
                        }
                    } catch (e) {
                        console.error(e);
                    }
                }, 1000);
                return () => clearInterval(interval);
            }, []);

            // Auto-scroll console logs
            useEffect(() => {
                if (terminalEndRef.current) {
                    terminalEndRef.current.scrollIntoView({ behavior: 'smooth' });
                }
            }, [logs]);

            const handleUpload = async (file) => {
                if (!file) return;
                const formData = new FormData();
                formData.append("file", file);
                setIsUploading(true);
                setUploadProgress(`Uploading '${file.name}'...`);
                setIndexingStatus("Syncing");

                try {
                    const res = await fetch("/v1/upload", {
                        method: "POST",
                        body: formData
                    });
                    await res.json();
                    setIsUploading(false);
                    setUploadProgress('');
                    setIndexingStatus("Ready");
                    loadDocuments();
                } catch (e) {
                    console.error(e);
                    setIsUploading(false);
                    setUploadProgress('');
                    setIndexingStatus("Ready");
                }
            };

            const handleStopQuery = () => {
                if (activeEventSourceRef.current) {
                    activeEventSourceRef.current.close();
                    activeEventSourceRef.current = null;
                }
                setIsSearching(false);
                setLogs(prev => [...prev, "⚠ Ingest investigation stopped by user."]);
            };

            const navigateToLanding = () => {
                // 1. Stop active event streams instantly
                if (activeEventSourceRef.current) {
                    activeEventSourceRef.current.close();
                    activeEventSourceRef.current = null;
                }
                // 2. Reset query text and log outputs completely
                setQuery('');
                setLogs([]);
                setSynthesis('');
                setIsSearching(false);
                
                // 3. Navigate back to landing
                setViewMode('landing');
            };

            const triggerQuery = async () => {
                if (!query.trim()) return;
                
                // Close any existing active streams first
                if (activeEventSourceRef.current) {
                    activeEventSourceRef.current.close();
                }

                setViewMode('workspace');
                setIsSearching(true);
                setLogs([]);
                setSynthesis('');

                const eventSource = new EventSource(`/v1/query/stream?query=${encodeURIComponent(query)}`);
                activeEventSourceRef.current = eventSource;

                eventSource.onmessage = (event) => {
                    const data = JSON.parse(event.data);
                    if (data.type === 'log') {
                        setLogs(prev => [...prev, data.message]);
                    } else if (data.type === 'done') {
                        setSynthesis(data.answer);
                        setIsSearching(false);
                        eventSource.close();
                        activeEventSourceRef.current = null;
                    } else if (data.type === 'error') {
                        setLogs(prev => [...prev, `Error: ${data.message}`]);
                        setIsSearching(false);
                        eventSource.close();
                        activeEventSourceRef.current = null;
                    }
                };
            };

            return (
                <div className="flex flex-col min-h-screen font-sans bg-[#fbfaf7]">
                    {/* Premium Dark-Slate Header */}
                    <header className="sticky top-0 z-30 bg-slate-950 border-b border-slate-800 px-8 py-4 flex justify-between items-center shadow-lg">
                        <div className="flex items-center gap-2 cursor-pointer" onClick={navigateToLanding}>
                            <h1 className="font-outfit text-lg font-bold text-white tracking-tight flex items-center gap-2">
                                Intellecta <span className="font-sans text-[9px] font-bold tracking-wider uppercase bg-brand-600 text-white px-2 py-0.5 rounded-md">Amber</span>
                            </h1>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="flex items-center gap-2 bg-slate-900 border border-slate-800 rounded-full px-4 py-1.5 text-xs font-medium text-slate-300">
                                <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 shadow-sm animate-pulse"></span> Ingestion Active
                            </div>
                        </div>
                    </header>

                    {/* Main Area */}
                    {viewMode === 'landing' ? (
                        /* Luxury Amber Editorial Landing Page */
                        <div className="flex-1 flex items-center justify-center px-12 py-12 md:py-20 bg-gradient-to-b from-brand-50/10 to-[#fbfaf7]">
                            <div className="max-w-7xl w-full grid grid-cols-1 lg:grid-cols-2 gap-12 items-center">
                                
                                {/* Left Column - Floating graphics */}
                                <div className="relative flex justify-center">
                                    <div className="w-full max-w-md md:max-w-lg floating-graphic relative">
                                        <div className="absolute -top-8 -left-8 w-32 h-32 bg-brand-500/10 rounded-full filter blur-2xl"></div>
                                        <div className="absolute -bottom-8 -right-8 w-40 h-40 bg-emerald-500/5 rounded-full filter blur-2xl"></div>
                                        
                                        {/* Premium Inline Vector RAG Illustration */}
                                        <div className="bg-white rounded-3xl border border-slate-200 shadow-2xl overflow-hidden p-8 relative z-10 transition-all duration-500 hover:scale-[1.03] hover:shadow-brand-500/10 animate-fade-in-up stagger-1">
                                            <svg viewBox="0 0 400 300" fill="none" xmlns="http://www.w3.org/2000/svg" className="w-full h-auto">
                                                {/* Background subtle connections */}
                                                <path d="M100 150 H300 M200 80 V220" stroke="#ffedd5" strokeWidth="2" strokeDasharray="4 4" />
                                                <path d="M120 100 L280 200" stroke="#ffedd5" strokeWidth="1.5" strokeDasharray="6 6" />
                                                <path d="M120 200 L280 100" stroke="#ffedd5" strokeWidth="1.5" strokeDasharray="6 6" />

                                                {/* Central AI Engine Node */}
                                                <circle cx="200" cy="150" r="45" fill="url(#amberGlow)" className="animate-pulse" />
                                                <circle cx="200" cy="150" r="25" fill="#ea580c" />
                                                
                                                {/* Inner Core Icon */}
                                                <path d="M192 150 L197 155 L208 144" stroke="white" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />

                                                {/* Document Nodes */}
                                                {/* Top Left Doc */}
                                                <g transform="translate(70, 60)" className="transition-transform duration-300 hover:translate-y-[-5px]">
                                                    <rect width="50" height="65" rx="8" fill="#ffffff" stroke="#f97316" strokeWidth="2" />
                                                    <path d="M10 15 H40 M10 25 H30 M10 35 H40" stroke="#fed7aa" strokeWidth="2" strokeLinecap="round" />
                                                    <circle cx="40" cy="53" r="4" fill="#f97316" />
                                                </g>

                                                {/* Top Right Doc */}
                                                <g transform="translate(280, 60)">
                                                    <rect width="50" height="65" rx="8" fill="#ffffff" stroke="#a855f7" strokeWidth="2" />
                                                    <path d="M10 15 H40 M10 25 H30 M10 35 H40" stroke="#f3e8ff" strokeWidth="2" strokeLinecap="round" />
                                                    <circle cx="40" cy="53" r="4" fill="#a855f7" />
                                                </g>

                                                {/* Bottom Left Doc */}
                                                <g transform="translate(70, 180)">
                                                    <rect width="50" height="65" rx="8" fill="#ffffff" stroke="#10b981" strokeWidth="2" />
                                                    <path d="M10 15 H40 M10 25 H30 M10 35 H40" stroke="#d1fae5" strokeWidth="2" strokeLinecap="round" />
                                                    <circle cx="40" cy="53" r="4" fill="#10b981" />
                                                </g>

                                                {/* Bottom Right Doc */}
                                                <g transform="translate(280, 180)">
                                                    <rect width="50" height="65" rx="8" fill="#ffffff" stroke="#3b82f6" strokeWidth="2" />
                                                    <path d="M10 15 H40 M10 25 H30 M10 35 H40" stroke="#dbeafe" strokeWidth="2" strokeLinecap="round" />
                                                    <circle cx="40" cy="53" r="4" fill="#3b82f6" />
                                                </g>

                                                {/* Dynamic scanning vectors */}
                                                <circle cx="150" cy="112" r="5" fill="#f97316" className="animate-ping" />
                                                <circle cx="250" cy="187" r="5" fill="#a855f7" />
                                                <circle cx="250" cy="112" r="5" fill="#10b981" />
                                                <circle cx="150" cy="187" r="5" fill="#3b82f6" />

                                                {/* Definitions */}
                                                <defs>
                                                    <radialGradient id="amberGlow" cx="50%" cy="50%" r="50%">
                                                        <stop offset="0%" stopColor="#ffedd5" stopOpacity="1" />
                                                        <stop offset="100%" stopColor="#ea580c" stopOpacity="0.15" />
                                                    </radialGradient>
                                                </defs>
                                            </svg>
                                        </div>
                                        <div className="h-4 bg-slate-300 rounded-b-2xl w-[94%] mx-auto border-t border-slate-400/50 shadow-lg"></div>
                                    </div>
                                </div>

                                {/* Right Column - Clean Corporate Header */}
                                <div className="flex flex-col gap-6 lg:pl-8 animate-fade-in-up stagger-2">
                                    <div className="inline-flex items-center gap-2 self-start bg-brand-50 text-brand-600 border border-brand-100 px-4 py-1.5 rounded-full text-xs font-semibold tracking-wide uppercase">
                                        ⚡ Premium Multi-Doc Agentic RAG
                                    </div>
                                    <h2 className="font-outfit text-4xl md:text-5xl lg:text-6xl font-black text-slate-900 leading-[1.1] tracking-tight">
                                        Upload & Search <br/>
                                        <span className="text-brand-600">File Workspace</span>
                                    </h2>
                                    <p className="text-slate-500 text-base leading-relaxed max-w-md">
                                        Empower your research workspace with cognitive multi-document ingestion, real-time semantic indexing, and proactive reasoning insights.
                                    </p>

                                    {/* Elevated, Highly-Visible Actions */}
                                    <div className="flex flex-col gap-4 max-w-md mt-2">
                                        {/* Beautiful, Prominent Upload Button */}
                                        <div 
                                            onClick={() => fileInputRef.current.click()}
                                            className="border-2 border-dashed border-brand-500 hover:border-brand-600 bg-brand-50 hover:bg-brand-100/50 rounded-2xl p-5 flex flex-col items-center justify-center cursor-pointer transition-all duration-300 hover:-translate-y-0.5 shadow-sm group"
                                        >
                                            <svg className="w-8 h-8 stroke-brand-600 mb-2 group-hover:scale-110 transition-transform duration-300" fill="none" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                            <span className="font-outfit font-bold text-sm text-brand-700">Click to Upload Document</span>
                                            <span className="text-[10px] text-slate-400 mt-1">PDF, DOCX, Markdown & Text</span>
                                        </div>

                                        {/* Staggered Get Started Search Trigger */}
                                        <button onClick={() => setViewMode('workspace')} className="bg-slate-950 hover:bg-brand-600 text-white text-sm font-bold py-4 rounded-2xl transition-all duration-300 shadow-lg hover:-translate-y-0.5 flex items-center justify-center gap-2">
                                            Get started
                                            <svg className="w-4 h-4 fill-none stroke-current" strokeWidth="2.5" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                                        </button>

                                        {/* Premium Visual Relationship Graph trigger */}
                                        <button 
                                            onClick={() => {
                                                loadRelationships();
                                                setShowAnalytics(true);
                                            }} 
                                            className="bg-white border border-slate-200 text-slate-700 hover:border-brand-500 hover:text-brand-600 text-xs font-semibold py-3.5 rounded-2xl transition-all duration-300 shadow-sm hover:-translate-y-0.5 flex items-center justify-center gap-2"
                                        >
                                            🔮 View Workspace Semantic Graph
                                        </button>
                                    </div>
                                </div>

                            </div>
                        </div>
                    ) : (
                        /* Workspace Workspace Canvas */
                        <div className="flex-1 flex flex-col px-12 py-8 gap-8 max-w-7xl mx-auto w-full pb-28">
                            {/* Floating Back button */}
                            <button onClick={() => setViewMode('landing')} className="self-start inline-flex items-center gap-2 text-xs font-semibold text-slate-500 hover:text-slate-800 transition-colors">
                                ← Back to Landing Page
                            </button>

                            {/* Active Search Input Console */}
                            <div className={`flex flex-col gap-6 transition-all duration-500 ${logs.length > 0 ? 'mt-0' : 'mt-8'}`}>
                                <div className="flex flex-col items-center text-center gap-2 max-w-lg mx-auto mb-2">
                                    <h3 className="font-outfit text-2xl font-bold text-slate-900 tracking-tight">Search Document Matrix</h3>
                                    <p className="text-slate-400 text-xs">Enter queries to initiate semantic extraction loop.</p>
                                </div>

                                <div className="bg-white border border-slate-200 rounded-3xl p-1.5 flex shadow-xl focus-within:border-brand-600 focus-within:shadow-brand-600/5 transition-all max-w-3xl w-full mx-auto">
                                    <input 
                                        type="text" 
                                        value={query}
                                        onChange={(e) => setQuery(e.target.value)}
                                        onKeyDown={(e) => e.key === 'Enter' && triggerQuery()}
                                        placeholder="Ask a query to launch cognitive investigation loop..." 
                                        className="flex-1 bg-transparent border-none outline-none px-5 text-slate-800 font-normal placeholder-slate-400 text-base"
                                    />
                                    <button onClick={triggerQuery} className="bg-brand-600 hover:bg-brand-700 text-white font-semibold px-8 py-3.5 rounded-2xl transition-colors text-sm shadow-md">
                                        {isSearching ? 'Running...' : 'Run Query'}
                                    </button>
                                </div>

                                {/* Big Upload Box Inside Workspace (Highly Visible!) */}
                                {logs.length === 0 && (
                                    <div 
                                        onClick={() => fileInputRef.current.click()}
                                        className="border-2 border-dashed border-brand-500/50 hover:border-brand-500 bg-white/80 hover:bg-brand-50/30 rounded-2xl p-8 max-w-3xl w-full mx-auto flex flex-col items-center justify-center cursor-pointer transition-all duration-300 shadow-sm group mt-2"
                                    >
                                        <svg className="w-10 h-10 stroke-brand-500 mb-3 group-hover:scale-115 transition-transform duration-300" fill="none" viewBox="0 0 24 24" strokeWidth="2.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                                        <span className="font-outfit font-bold text-base text-brand-700">Add more documents to this search loop</span>
                                        <span className="text-xs text-slate-400 mt-1">Drag and drop files or click anywhere to pick</span>
                                    </div>
                                )}
                            </div>

                            {/* Workspace Results Panels */}
                            {(logs.length > 0 || synthesis) && (
                                <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 items-stretch animate-fade-in">
                                    
                                    {/* Left Side: Traces console */}
                                    <div className="lg:col-span-7 bg-white border border-slate-200 rounded-3xl shadow-lg flex flex-col overflow-hidden max-h-[550px] transition-all duration-300 hover:-translate-y-1">
                                        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                            <div className="flex items-center gap-2 font-outfit text-xs font-semibold tracking-wide uppercase text-slate-500">
                                                <span className="w-2 h-2 bg-brand-600 rounded-full animate-ping"></span> Agent Reasoning Traces
                                            </div>
                                            <span className="text-[10px] font-medium text-slate-400 bg-slate-100 px-2 py-0.5 rounded">{isSearching ? 'Investigating...' : 'Idle'}</span>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 font-mono text-xs text-slate-600 bg-[#fafafa]">
                                            {logs.map((log, i) => {
                                                let logClass = '';
                                                if (log.startsWith('[perception]')) logClass = 'perception';
                                                if (log.startsWith('[decision]')) logClass = 'decision';
                                                if (log.startsWith('[action]')) logClass = 'action';
                                                if (log.startsWith('[memory]')) logClass = 'memory';
                                                if (log.startsWith('[done]')) logClass = 'done';
                                                return (
                                                    <div key={i} className={`log-card mb-3 p-3 rounded-lg bg-white shadow-sm ${logClass}`}>
                                                        {log}
                                                    </div>
                                                );
                                            })}
                                            <div ref={terminalEndRef}></div>
                                        </div>
                                    </div>

                                    {/* Right Side: Synthesis response findings */}
                                    <div className="lg:col-span-5 bg-white border border-slate-200 rounded-3xl shadow-lg flex flex-col overflow-hidden max-h-[550px] transition-all duration-300 hover:-translate-y-1">
                                        <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                            <div className="flex items-center gap-2 font-outfit text-xs font-semibold tracking-wide uppercase text-slate-500">
                                                <span className="w-2 h-2 bg-emerald-500 rounded-full"></span> Synthesized Report
                                            </div>
                                        </div>
                                        <div className="flex-1 overflow-y-auto p-6 text-sm text-slate-600 leading-relaxed font-normal prose prose-indigo">
                                            {isSearching ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 gap-2">
                                                    <div className="w-8 h-8 rounded-full border-2 border-brand-100 border-t-brand-600 animate-spin"></div>
                                                    <p className="text-xs font-medium mt-2">Synthesizing cognitive RAG response...</p>
                                                </div>
                                            ) : synthesis ? (
                                                <div dangerouslySetInnerHTML={{ __html: synthesis.replace(/\n/g, '<br/>') }}></div>
                                            ) : (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400 text-center gap-2">
                                                    <svg className="w-10 h-10 stroke-current opacity-40" viewBox="0 0 24 24" fill="none" strokeWidth="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
                                                    <p className="text-xs">Synthesis findings will compile when searching completes.</p>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                </div>
                            )}
                        </div>
                    )}

                    {/* Floating Global Progress Tracker Banner */}
                    {isUploading && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-slate-950 border border-brand-500 text-white rounded-2xl px-6 py-4 flex items-center gap-4 shadow-2xl z-50 animate-bounce">
                            <div className="w-4 h-4 rounded-full border-2 border-brand-500 border-t-transparent animate-spin"></div>
                            <span className="text-xs font-bold">{uploadProgress || 'Vectorizing documents...'}</span>
                        </div>
                    )}

                    {/* Mac Floating Action Dock (Always Available Global Footer) */}
                    <div className="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-950 border border-slate-800 rounded-3xl px-6 py-3 flex items-center gap-4 shadow-2xl z-40">
                        <div className="flex items-center gap-2 bg-slate-900 border border-slate-850 rounded-xl px-3 py-1.5 text-[11px] font-bold text-brand-500">
                            {filesCount} Files Indexed
                        </div>
                        <div className={`text-[11px] font-bold px-3 py-1.5 rounded-xl ${indexingStatus === 'Ready' ? 'bg-emerald-950/80 text-emerald-400 border border-emerald-900/35' : 'bg-amber-950/80 text-amber-400 border border-amber-900/35 animate-pulse'}`}>
                            {indexingStatus}
                        </div>
                        <button 
                            onClick={async () => {
                                if (confirm("Are you sure you want to wipe all indexed files and memories to start fresh?")) {
                                    try {
                                        const res = await fetch("/v1/reset", { method: "POST" });
                                        const data = await res.json();
                                        if (data.status === "success") {
                                            alert("Workspace successfully reset!");
                                            window.location.reload();
                                        }
                                    } catch(e) {
                                        console.error(e);
                                    }
                                }
                            }}
                            className="bg-rose-900/80 hover:bg-rose-800 text-rose-200 border border-rose-800/65 text-[11px] font-bold px-3 py-1.5 rounded-xl transition-colors cursor-pointer"
                        >
                            Reset Workspace
                        </button>
                    </div>

                    {/* Hidden Global File Input Referencer */}
                    <input 
                        type="file" 
                        ref={fileInputRef} 
                        onChange={(e) => {
                            if (e.target.files && e.target.files.length > 0) {
                                handleUpload(e.target.files[0]);
                            }
                        }} 
                        className="hidden" 
                    />

                    {/* Premium visual relationship analytics overlay drawer */}
                    {showAnalytics && (
                        <WorkspaceAnalytics 
                            data={relationshipData} 
                            activeTab={analyticsTab} 
                            setActiveTab={setAnalyticsTab} 
                            onClose={() => setShowAnalytics(false)} 
                        />
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
